<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kazeno Game Topup</title>
    <style>
        body { font-family: sans-serif; background-color: #0d1117; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #161b22; padding: 30px; border-radius: 15px; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #30363d; }
        h2 { text-align: center; margin-bottom: 20px; color: #58a6ff; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #238636; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .toggle-text { text-align: center; font-size: 13px; color: #8b949e; cursor: pointer; }
    </style>
</head>
<body>

<div class="login-card">
    <h2 id="form-title">Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="auth-btn">Login</button>
    <div class="toggle-text" id="toggle-form">အကောင့်မရှိသေးဘူးလား? Register လုပ်ရန်</div>
</div>

<script type="module" src="auth.js"></script>
</body>
</html>
