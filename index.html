<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Game Top-Up</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="glass-nav">
        <div class="logo">🎮 Kazeno Store</div>
        <ul class="nav-links">
            <li><a href="#" onclick="showPage('home')">Home</a></li>
            <li><a href="#" onclick="showPage('shop')">Shop</a></li>
            <li><a href="#" onclick="showPage('login')">Login</a></li>
        </ul>
    </nav>

    <div class="main-container">
        
        <section id="home" class="page active">
            <div class="glass-card hero-section">
                <h1>Welcome, ကိုယ့်လူတို့!</h1>
                <p>Mobile Legend Diamonds နှင့် PUBG UC များကို ယုံကြည်စိတ်ချစွာ ဝယ်ယူလိုက်ပါ။</p>
                <button class="btn-primary" onclick="showPage('shop')">Shop Now</button>
            </div>
        </section>

        <section id="shop" class="page">
            <h2 class="page-title">Top-Up Packages</h2>
            <div class="shop-grid">
                <div class="glass-card product">
                    <h3>💎 86 Diamonds</h3>
                    <p>Mobile Legends</p>
                    <p class="price">2,500 MMK</p>
                    <button class="btn-buy">Buy Now</button>
                </div>
                <div class="glass-card product">
                    <h3>💵 60 UC</h3>
                    <p>PUBG Mobile</p>
                    <p class="price">3,000 MMK</p>
                    <button class="btn-buy">Buy Now</button>
                </div>
            </div>
        </section>

        <section id="login" class="page">
            <div class="glass-card login-box">
                <h2>User Login</h2>
                <input type="email" id="email" class="glass-input" placeholder="Email">
                <input type="password" id="password" class="glass-input" placeholder="Password">
                <button class="btn-primary" id="loginBtn">Login</button>
            </div>
        </section>

    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
