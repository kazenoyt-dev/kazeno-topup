<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kazeno+ | Mobile Legends Topup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #f3f4f6; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .package-card { transition: all 0.2s ease; border: 2px solid #e5e7eb; background: #ffffff; }
        .package-card.selected { border-color: #3b82f6; background-color: #eff6ff; }
        .package-card:active { transform: scale(0.98); }
        .loader { border: 3px solid #e5e7eb; border-top: 3px solid #ffffff; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-24">

    <div class="bg-blue-600 text-white rounded-b-[2rem] pt-6 pb-16 px-4 shadow-md relative">
        <div class="max-w-md mx-auto text-center">
            <h1 class="text-2xl font-bold flex items-center justify-center gap-2">
                <i class="fas fa-gamepad"></i> Kazeno+
            </h1>
            <p class="text-blue-100 text-sm mt-1">Mobile Legends Topup</p>
        </div>
    </div>

    <main class="max-w-md mx-auto px-4 -mt-10 relative z-10 space-y-5">
        
        <div class="bg-white rounded-2xl shadow-sm p-5 border border-gray-100">
            <h3 class="text-gray-800 font-semibold mb-3 flex items-center gap-2">
                <span class="bg-blue-100 text-blue-600 w-6 h-6 rounded-full flex items-center justify-center text-sm font-bold">1</span>
                Player ID
            </h3>
            <div class="grid grid-cols-2 gap-3">
                <input type="number" id="userId" placeholder="User ID" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-gray-800 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                <input type="number" id="zoneId" placeholder="Zone ID" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-gray-800 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
            </div>
            <p class="text-xs text-gray-400 mt-2 ml-1">eg. 178178050 (2911)</p>
        </div>

        <div class="bg-white rounded-2xl shadow-sm p-5 border border-gray-100">
            <h3 class="text-gray-800 font-semibold mb-3 flex items-center gap-2">
                <span class="bg-blue-100 text-blue-600 w-6 h-6 rounded-full flex items-center justify-center text-sm font-bold">2</span>
                Diamond Packages
            </h3>
            <div class="grid grid-cols-3 gap-3">
                <div class="package-card rounded-xl p-3 text-center cursor-pointer" onclick="selectPackage(this, '11', 1000)">
                    <i class="far fa-gem text-blue-500 text-2xl mb-1"></i>
                    <div class="font-bold text-gray-800 text-sm">11 Diamonds</div>
                    <div class="text-blue-600 text-xs font-semibold mt-1">1,000 Ks</div>
                </div>
                <div class="package-card rounded-xl p-3 text-center cursor-pointer" onclick="selectPackage(this, '22', 2000)">
                    <i class="far fa-gem text-blue-500 text-2xl mb-1"></i>
                    <div class="font-bold text-gray-800 text-sm">22 Diamonds</div>
                    <div class="text-blue-600 text-xs font-semibold mt-1">2,000 Ks</div>
                </div>
                <div class="package-card rounded-xl p-3 text-center cursor-pointer" onclick="selectPackage(this, '56', 5000)">
                    <i class="far fa-gem text-blue-500 text-2xl mb-1"></i>
                    <div class="font-bold text-gray-800 text-sm">56 Diamonds</div>
                    <div class="text-blue-600 text-xs font-semibold mt-1">5,000 Ks</div>
                </div>
                <div class="package-card rounded-xl p-3 text-center cursor-pointer" onclick="selectPackage(this, '112', 10000)">
                    <i class="far fa-gem text-blue-500 text-2xl mb-1"></i>
                    <div class="font-bold text-gray-800 text-sm">112 Diamonds</div>
                    <div class="text-blue-600 text-xs font-semibold mt-1">10,000 Ks</div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm p-5 border border-gray-100">
            <h3 class="text-gray-800 font-semibold mb-3 flex items-center gap-2">
                <span class="bg-blue-100 text-blue-600 w-6 h-6 rounded-full flex items-center justify-center text-sm font-bold">3</span>
                Payment Method
            </h3>
            <select id="paymentMethod" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-gray-800 focus:outline-none focus:border-blue-500">
                <option value="KPay">KBZ Pay</option>
                <option value="WavePay">Wave Pay</option>
            </select>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 p-4 px-6 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <p class="text-xs text-gray-500 uppercase font-semibold">Total Price</p>
                <p class="text-xl font-bold text-blue-600" id="totalPrice">0 Ks</p>
            </div>
            <button id="buyBtn" onclick="submitOrder()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl shadow-md flex items-center gap-2 transition-colors">
                <span>Order Now</span>
                <div id="btnLoader" class="loader"></div>
            </button>
        </div>
    </div>

    <script>
        // ⚠️ သင့်ရဲ့ Firebase Config ကို ဒီနေရာမှာ အစားထိုးပါ ⚠️
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let selectedItem = null;
        let selectedPrice = 0;

        function selectPackage(element, item, price) {
            document.querySelectorAll('.package-card').forEach(card => card.classList.remove('selected'));
            element.classList.add('selected');
            selectedItem = item;
            selectedPrice = price;
            document.getElementById('totalPrice').innerText = price.toLocaleString() + ' Ks';
        }

        async function submitOrder() {
            const uid = document.getElementById('userId').value;
            const zid = document.getElementById('zoneId').value;
            const paymentMethod = document.getElementById('paymentMethod').value;
            const btn = document.getElementById('buyBtn');
            const loader = document.getElementById('btnLoader');

            if(!uid || !zid) return alert("User ID နှင့် Zone ID ကို ထည့်ပါ။");
            if(!selectedItem) return alert("စိန်ပမာဏ ရွေးချယ်ပေးပါ။");

            btn.disabled = true;
            loader.style.display = "block";
            btn.querySelector('span').innerText = "Processing...";

            const orderId = 'ORD-' + Math.random().toString(36).substr(2, 6).toUpperCase();
            const fullPlayerId = `${uid} (${zid})`;

            try {
                await db.collection("orders").doc(orderId).set({
                    orderId: orderId,
                    item: selectedItem,
                    playerId: fullPlayerId,
                    price: selectedPrice,
                    paymentMethod: paymentMethod,
                    status: "Pending",
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                alert(`🎉 အော်ဒါတင်ခြင်း အောင်မြင်ပါသည်။\nOrder ID: ${orderId}`);
                
                document.getElementById('userId').value = "";
                document.getElementById('zoneId').value = "";
                document.querySelectorAll('.package-card').forEach(card => card.classList.remove('selected'));
                document.getElementById('totalPrice').innerText = "0 Ks";
                selectedItem = null;

            } catch (error) {
                alert("အမှားအယွင်းဖြစ်ပေါ်နေပါသည်။");
            } finally {
                btn.disabled = false;
                loader.style.display = "none";
                btn.querySelector('span').innerText = "Order Now";
            }
        }
    </script>
</body>
</html>
