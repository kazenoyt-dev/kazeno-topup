<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin - Kazeno Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#050510; --glass:rgba(20,25,45,0.7); --border:rgba(255,255,255,0.1); --text:#fff; --muted:#9ca3af; --primary:#8a2be2; --accent:#4facfe; --ok:#10b981; --danger:#ef4444; --warning:#f59e0b; }
  *{box-sizing:border-box; outline:none; margin:0; padding:0; font-family:'Poppins',sans-serif;}
  body{background:var(--bg); color:var(--text); display:flex; flex-direction:column; height:100vh;}
  .top-nav{background:var(--glass); border-bottom:1px solid var(--border); padding:15px; display:flex; justify-content:space-between; align-items:center; overflow-x:auto;}
  .brand{font-weight:800; font-size:18px; color:var(--accent);}
  .nav-tabs{display:flex; gap:10px;}
  .tab-btn{background:transparent; border:none; color:var(--muted); font-size:13px; font-weight:600; cursor:pointer; padding:6px 12px; border-radius:8px; white-space:nowrap;}
  .tab-btn.active{background:rgba(79,172,254,0.15); color:var(--accent);}
  .content{padding:20px; flex:1; overflow-y:auto;}
  .view{display:none; animation:fadeIn 0.3s;} .view.active{display:block;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .stat-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:15px; margin-bottom:20px;}
  .stat-card{background:var(--glass); border:1px solid var(--border); padding:15px; border-radius:12px; text-align:center;}
  .data-item{background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:12px; padding:15px; margin-bottom:10px; display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; gap:10px;}
  .badge{padding:4px 8px; border-radius:6px; font-size:10px; font-weight:700; text-transform:uppercase;}
  .btn{padding:8px 12px; border-radius:8px; border:none; font-size:12px; font-weight:600; cursor:pointer; color:#fff;}
  .btn-ok{background:var(--ok); color:#000;} .btn-danger{background:var(--danger);} .btn-edit{background:var(--accent); color:#000;}
  .input-box{width:100%; background:rgba(0,0,0,0.5); border:1px solid var(--border); padding:10px; border-radius:8px; color:#fff; margin-bottom:10px; font-size:13px;}
  .modal-bg{position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:100; display:none; align-items:center; justify-content:center; padding:20px;}
  .modal-bg.active{display:flex;}
  .modal-card{background:var(--bg); border:1px solid var(--border); border-radius:16px; padding:20px; width:100%; max-width:400px; max-height:90vh; overflow-y:auto;}
  .toast{position:fixed; top:20px; right:20px; background:var(--accent); color:#000; padding:10px 20px; border-radius:8px; font-weight:700; font-size:13px; opacity:0; transition:0.3s; z-index:2000;}
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div id="toast" class="toast">Success</div>

<div id="auth-gate" style="position:fixed; inset:0; background:var(--bg); z-index:999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <h2 style="color:var(--accent); margin-bottom:20px;">Admin Access</h2>
    <input type="password" id="admin-pin" placeholder="Enter PIN" style="padding:15px; border-radius:10px; border:1px solid var(--border); background:#111; color:#fff; text-align:center; margin-bottom:15px;">
    <button class="btn btn-edit" onclick="checkPin()" style="padding:12px 30px;">Enter</button>
</div>

<div id="main-admin" style="display:none; height:100%; flex-direction:column;">
    <div class="top-nav">
        <div class="brand">Kazeno Admin</div>
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('v-dash', this)">Dash</button>
            <button class="tab-btn" onclick="switchTab('v-store', this)">Store Mgt</button>
            <button class="tab-btn" onclick="switchTab('v-users', this)">Users</button>
            <button class="tab-btn" onclick="switchTab('v-orders', this)">Orders</button>
            <button class="tab-btn" onclick="switchTab('v-deposits', this)">Deposits</button>
        </div>
    </div>

    <div class="content">
        <div id="v-dash" class="view active">
            <div class="stat-grid">
                <div class="stat-card"><div style="font-size:11px; color:var(--muted);">Users</div><div id="st-users" style="font-size:20px; font-weight:bold; color:var(--accent);">0</div></div>
                <div class="stat-card"><div style="font-size:11px; color:var(--muted);">Pending Orders</div><div id="st-p-orders" style="font-size:20px; font-weight:bold; color:var(--warning);">0</div></div>
                <div class="stat-card"><div style="font-size:11px; color:var(--muted);">Pending Deps</div><div id="st-p-deps" style="font-size:20px; font-weight:bold; color:var(--warning);">0</div></div>
            </div>
        </div>

        <div id="v-store" class="view">
            <h3 style="margin-bottom:10px; color:var(--accent);">Global Settings</h3>
            <div class="data-item" style="flex-direction:column; align-items:flex-start;">
                <label style="font-size:12px; color:var(--muted);">Home Screen Banner URL</label>
                <input type="text" id="inp-home-banner" class="input-box" placeholder="https://...">
                <button class="btn btn-ok" onclick="saveHomeBanner()">Save Banner</button>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; margin:25px 0 15px;">
                <h3 style="color:var(--accent);">Games & Categories</h3>
                <button class="btn btn-edit" onclick="openGameModal()">+ Add Game</button>
            </div>
            <div id="list-games">Loading games...</div>
        </div>

        <div id="v-users" class="view"><h3 style="margin-bottom:15px;">Users</h3><div id="list-users">Loading...</div></div>
        <div id="v-orders" class="view"><h3 style="margin-bottom:15px;">Orders</h3><div id="list-orders">Loading...</div></div>
        <div id="v-deposits" class="view"><h3 style="margin-bottom:15px;">Deposits</h3><div id="list-deposits">Loading...</div></div>
    </div>
</div>

<div class="modal-bg" id="game-modal">
    <div class="modal-card">
        <h3 id="gm-title" style="margin-bottom:15px;">Add/Edit Game</h3>
        <input type="hidden" id="gm-id">
        <input type="text" id="gm-name" class="input-box" placeholder="Game Name (e.g. Mobile Legends)">
        <input type="text" id="gm-code" class="input-box" placeholder="Game Code (e.g. mlbb)">
        <input type="text" id="gm-logo" class="input-box" placeholder="Logo Image URL">
        <input type="text" id="gm-banner" class="input-box" placeholder="Detail Banner Image URL">
        <input type="number" id="gm-order" class="input-box" placeholder="Sort Order (e.g. 1)">
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="btn btn-ok" style="flex:1;" onclick="saveGame()">Save</button>
            <button class="btn btn-danger" style="flex:1;" onclick="closeModal('game-modal')">Cancel</button>
        </div>
    </div>
</div>

<div class="modal-bg" id="pack-modal">
    <div class="modal-card" style="max-width:500px;">
        <h3 style="margin-bottom:10px;">Manage Packages</h3>
        <div style="font-size:12px; color:var(--muted); margin-bottom:15px;" id="pm-game-name"></div>
        
        <div style="background:rgba(0,0,0,0.3); padding:10px; border-radius:8px; margin-bottom:15px; border:1px solid var(--border);">
            <div style="display:flex; gap:5px; margin-bottom:5px;">
                <input type="text" id="pm-new-name" class="input-box" style="margin:0; flex:2;" placeholder="Item Name (e.g. 86 Dia)">
                <input type="number" id="pm-new-price" class="input-box" style="margin:0; flex:1;" placeholder="Price">
            </div>
            <input type="text" id="pm-new-icon" class="input-box" style="margin-bottom:5px;" placeholder="Icon URL (Optional)">
            <button class="btn btn-ok" style="width:100%;" onclick="addPackage()">+ Add Item</button>
        </div>

        <div id="pm-list" style="display:flex; flex-direction:column; gap:5px; max-height:250px; overflow-y:auto; margin-bottom:15px;"></div>
        
        <div style="display:flex; gap:10px;">
            <button class="btn btn-edit" style="flex:1;" onclick="savePackages()">Save Changes</button>
            <button class="btn btn-danger" style="flex:1;" onclick="closeModal('pack-modal')">Close</button>
        </div>
    </div>
</div>

<div class="modal-bg" id="slip-modal" onclick="if(event.target===this) closeModal('slip-modal')">
    <div class="modal-card" style="text-align:center;">
        <h3 style="margin-bottom:10px;">Payment Slip</h3>
        <img id="modal-img-src" style="width:100%; border-radius:12px; margin-bottom:15px;" src="">
        <button class="btn btn-edit" style="width:100%;" onclick="closeModal('slip-modal')">Close</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, getDoc, setDoc, addDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAV2vKB0pBq4PP7LcKFO2h9D9dmZF7J2IU",
        authDomain: "kazeno-diamond-shop.firebaseapp.com",
        projectId: "kazeno-diamond-shop",
        storageBucket: "kazeno-diamond-shop.firebasestorage.app",
        messagingSenderId: "1209500360",
        appId: "1:1209500360:web:0e6f932cfd1569234e9bfd"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.toast = (m) => { const t = document.getElementById("toast"); t.textContent = m; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 2500); }
    function formatDate(ts) { if(!ts) return "N/A"; const d = ts.toDate ? ts.toDate() : new Date(ts); return d.toLocaleString('en-US', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}); }

    window.checkPin = () => {
        if(document.getElementById('admin-pin').value === "1234") {
            document.getElementById('auth-gate').style.display = "none";
            document.getElementById('main-admin').style.display = "flex";
            initAdmin();
        } else toast("Wrong PIN!");
    };

    window.switchTab = (viewId, el) => {
        document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        el.classList.add('active'); document.getElementById(viewId).classList.add('active');
    };
    
    window.closeModal = (id) => document.getElementById(id).classList.remove('active');
    window.viewSlip = (url) => { if(!url)return toast("No slip"); document.getElementById('modal-img-src').src = url; document.getElementById('slip-modal').classList.add('active'); };

    // --- STORE MANAGEMENT (NEW) ---
    let editingGameId = null;
    let editingPackages = [];

    function initAdmin() {
        // 1. Settings (Banner)
        onSnapshot(doc(db, "settings", "app_config"), (d) => {
            if(d.exists()) document.getElementById('inp-home-banner').value = d.data().homeBannerUrl || '';
        });

        // 2. Games
        onSnapshot(query(collection(db, "games"), orderBy("orderNum", "asc")), (snap) => {
            let html = "";
            snap.forEach(s => {
                let g = {id: s.id, ...s.data()};
                html += `
                <div class="data-item">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <img src="${g.logoUrl}" style="width:40px; height:40px; border-radius:8px; object-fit:cover;">
                        <div>
                            <div style="font-weight:bold; color:#fff;">${g.name} <span style="font-size:10px; color:var(--muted);">(${g.code})</span></div>
                            <div style="font-size:11px; color:var(--accent);">Items: ${(g.packages||[]).length} | Order: ${g.orderNum}</div>
                        </div>
                    </div>
                    <div style="display:flex; gap:5px;">
                        <button class="btn btn-ok" onclick='openPackageModal(${JSON.stringify(g).replace(/'/g, "&#39;")})'>📦 Items</button>
                        <button class="btn btn-edit" onclick='openGameModal(${JSON.stringify(g).replace(/'/g, "&#39;")})'>✏️ Edit</button>
                        <button class="btn btn-danger" onclick="deleteGame('${g.id}')">🗑️</button>
                    </div>
                </div>`;
            });
            document.getElementById('list-games').innerHTML = html || "<p>No games found.</p>";
        });

        // Listeners for Users, Orders, Deposits (Same as before)
        onSnapshot(collection(db, "users"), (snap) => {
            document.getElementById('st-users').innerText = snap.size;
            let html = "";
            snap.forEach(d => {
                let u = d.data();
                html += `<div class="data-item"><div><strong>${u.email}</strong><br><span style="color:var(--ok);">${(u.walletBalance||0).toLocaleString()} Ks</span></div>
                         <button class="btn btn-edit" onclick="editWallet('${d.id}', ${u.walletBalance||0}, '${u.email}')">Edit Bal</button></div>`;
            });
            document.getElementById('list-users').innerHTML = html;
        });

        onSnapshot(collection(db, "orders"), (snap) => {
            let pCount = 0; let html = "";
            let arr = []; snap.forEach(d => arr.push({id: d.id, ...d.data()}));
            arr.sort((a,b) => (b.createdAt?.toMillis()||0) - (a.createdAt?.toMillis()||0));
            arr.forEach(o => {
                if(o.status === 'Pending') pCount++;
                html += `<div class="data-item"><div style="flex:1;">
                    <span class="badge ${o.status==='Completed'?'completed':(o.status==='Cancelled'?'cancelled':'pending')}">${o.status}</span>
                    <strong style="margin-left:10px;">${o.game}</strong> - <span style="color:var(--accent);">${o.item}</span><br>
                    ID: ${o.playerId} ${o.serverId?`(${o.serverId})`:''} | ${o.price.toLocaleString()} Ks (${o.payMethod})<br>
                    <span style="font-size:10px;">${o.userEmail} | ${formatDate(o.createdAt)}</span></div>
                    <div style="display:flex; flex-direction:column; gap:5px;">
                        ${o.slipImage ? `<button class="btn btn-edit" onclick="viewSlip('${o.slipImage}')">Slip</button>`:''}
                        ${o.status==='Pending'?`<button class="btn btn-ok" onclick="updOrd('${o.id}','Completed')">Done</button><button class="btn btn-danger" onclick="updOrd('${o.id}','Cancelled')">Reject</button>`:''}
                    </div></div>`;
            });
            document.getElementById('list-orders').innerHTML = html; document.getElementById('st-p-orders').innerText = pCount;
        });

        onSnapshot(collection(db, "deposits"), (snap) => {
            let pCount = 0; let html = "";
            let arr = []; snap.forEach(d => arr.push({id: d.id, ...d.data()}));
            arr.sort((a,b) => (b.createdAt?.toMillis()||0) - (a.createdAt?.toMillis()||0));
            arr.forEach(dp => {
                if(dp.status === 'Pending') pCount++;
                html += `<div class="data-item"><div style="flex:1;">
                    <span class="badge ${dp.status==='Completed'?'completed':(o.status==='Cancelled'?'cancelled':'pending')}">${dp.status}</span><br>
                    <strong style="color:var(--ok); font-size:16px;">${dp.amount.toLocaleString()} Ks</strong><br>
                    <span style="font-size:10px;">${dp.userEmail} | ${formatDate(dp.createdAt)}</span></div>
                    <div style="display:flex; flex-direction:column; gap:5px;">
                        <button class="btn btn-edit" onclick="viewSlip('${dp.slipImage}')">Slip</button>
                        ${dp.status==='Pending'?`<button class="btn btn-ok" onclick="apprDep('${dp.id}','${dp.userId}',${dp.amount})">Add Funds</button><button class="btn btn-danger" onclick="updDep('${dp.id}','Cancelled')">Reject</button>`:''}
                    </div></div>`;
            });
            document.getElementById('list-deposits').innerHTML = html; document.getElementById('st-p-deps').innerText = pCount;
        });
    }

    // Settings actions
    window.saveHomeBanner = async () => {
        let url = document.getElementById('inp-home-banner').value;
        await setDoc(doc(db, "settings", "app_config"), { homeBannerUrl: url }, { merge: true });
        toast("Banner saved!");
    };

    // Game Actions
    window.openGameModal = (g = null) => {
        document.getElementById('gm-id').value = g ? g.id : '';
        document.getElementById('gm-name').value = g ? g.name : '';
        document.getElementById('gm-code').value = g ? g.code : '';
        document.getElementById('gm-logo').value = g ? g.logoUrl : '';
        document.getElementById('gm-banner').value = g ? g.bannerUrl : '';
        document.getElementById('gm-order').value = g ? g.orderNum : 1;
        document.getElementById('gm-title').innerText = g ? "Edit Game" : "Add New Game";
        document.getElementById('game-modal').classList.add('active');
    };

    window.saveGame = async () => {
        let id = document.getElementById('gm-id').value;
        let data = {
            name: document.getElementById('gm-name').value,
            code: document.getElementById('gm-code').value,
            logoUrl: document.getElementById('gm-logo').value,
            bannerUrl: document.getElementById('gm-banner').value,
            orderNum: parseInt(document.getElementById('gm-order').value) || 1
        };
        if(!data.name || !data.code) return toast("Name and Code required!");
        
        if(id) { await updateDoc(doc(db, "games", id), data); } 
        else { data.packages = []; await addDoc(collection(db, "games"), data); }
        closeModal('game-modal'); toast("Game saved!");
    };

    window.deleteGame = async (id) => {
        if(confirm("Are you sure you want to delete this game?")) {
            await deleteDoc(doc(db, "games", id)); toast("Deleted!");
        }
    };

    // Package Actions
    window.openPackageModal = (g) => {
        editingGameId = g.id;
        editingPackages = g.packages || [];
        document.getElementById('pm-game-name').innerText = "Editing items for: " + g.name;
        renderPackages();
        document.getElementById('pack-modal').classList.add('active');
    };

    function renderPackages() {
        let html = "";
        editingPackages.forEach((p, i) => {
            html += `<div style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.05); padding:8px; border-radius:6px;">
                <div style="font-size:12px;"><strong>${p.name}</strong> - <span style="color:var(--ok);">${p.price} Ks</span></div>
                <div style="display:flex; gap:5px;">
                    <button class="btn" style="padding:4px; background:#444;" onclick="movePack(${i},-1)">⬆️</button>
                    <button class="btn" style="padding:4px; background:#444;" onclick="movePack(${i},1)">⬇️</button>
                    <button class="btn btn-danger" style="padding:4px;" onclick="delPack(${i})">❌</button>
                </div>
            </div>`;
        });
        document.getElementById('pm-list').innerHTML = html;
    }

    window.addPackage = () => {
        let n = document.getElementById('pm-new-name').value;
        let p = parseInt(document.getElementById('pm-new-price').value);
        let ic = document.getElementById('pm-new-icon').value || "https://cdn-icons-png.flaticon.com/128/1077/1077114.png";
        if(!n || !p) return toast("Name and Price required!");
        editingPackages.push({name: n, price: p, icon: ic});
        document.getElementById('pm-new-name').value = ''; document.getElementById('pm-new-price').value = '';
        renderPackages();
    };

    window.delPack = (i) => { editingPackages.splice(i, 1); renderPackages(); };
    window.movePack = (i, dir) => {
        if(i+dir < 0 || i+dir >= editingPackages.length) return;
        let temp = editingPackages[i];
        editingPackages[i] = editingPackages[i+dir];
        editingPackages[i+dir] = temp;
        renderPackages();
    };

    window.savePackages = async () => {
        await updateDoc(doc(db, "games", editingGameId), { packages: editingPackages });
        closeModal('pack-modal'); toast("Packages updated!");
    };

    // Generic Actions
    window.editWallet = async (id, cur, em) => {
        let v = prompt(`Edit Wallet (${em})\nCurrent: ${cur}`, cur);
        if(v && !isNaN(v)) await updateDoc(doc(db, "users", id), {walletBalance: parseInt(v)});
    };
    window.updOrd = async (id, st) => { if(confirm(`Mark as ${st}?`)) await updateDoc(doc(db, "orders", id), {status:st}); };
    window.updDep = async (id, st) => { if(confirm(`Mark as ${st}?`)) await updateDoc(doc(db, "deposits", id), {status:st}); };
    window.apprDep = async (id, uid, amt) => {
        if(confirm(`Approve ${amt} Ks?`)) {
            let u = await getDoc(doc(db, "users", uid));
            await updateDoc(doc(db, "users", uid), {walletBalance: (u.data().walletBalance||0) + amt});
            await updateDoc(doc(db, "deposits", id), {status: 'Completed'});
            toast("Funds added!");
        }
    };
</script>
</body>
</html>
