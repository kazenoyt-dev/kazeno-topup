<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kazeno Game Topup - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0d1117;
            --card-color: #161b22;
            --primary-blue: #58a6ff;
            --text-main: #c9d1d9;
            --accent-green: #2ea44f;
            --accent-purple: #8957e5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            padding-bottom: 80px; /* Bottom Nav အတွက် နေရာချန်ခြင်း */
        }

        /* Header Section */
        .header {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .profile-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--accent-purple), var(--primary-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
        }

        .user-info h2 { margin: 0; font-size: 18px; color: white; }
        .user-info p { margin: 2px 0 0; font-size: 13px; color: #8b949e; }

        /* Wallet Card */
        .wallet-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            margin: 15px;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #30363d;
        }

        .wallet-card h3 { font-size: 14px; margin: 0; color: #8b949e; }
        .balance { font-size: 28px; font-weight: bold; margin: 10px 0; color: var(--accent-green); }

        .wallet-btns { display: flex; gap: 10px; margin-top: 15px; }
        .btn-wallet {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .btn-topup { background: white; color: black; }
        .btn-withdraw { background: #30363d; color: white; }

        /* Game List */
        .section-title { padding: 0 20px; font-size: 16px; margin-top: 25px; }
        .game-list { padding: 10px 15px; }
        .game-item {
            background: var(--card-color);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #30363d;
        }
        .game-detail { display: flex; align-items: center; gap: 12px; }
        .game-icon { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; }
        .game-name { font-weight: bold; font-size: 15px; }
        .game-sold { font-size: 12px; color: #8b949e; }
        .btn-buy { background: var(--accent-green); color: white; border: none; padding: 6px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #161b22;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid #30363d;
        }
        .nav-item { color: #8b949e; text-align: center; font-size: 11px; cursor: pointer; text-decoration: none; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: var(--primary-blue); }

        .hidden { display: none; }
    </style>
</head>
<body>

<div id="home-page">
    <div class="header">
        <div class="profile-img">K</div>
        <div class="user-info">
            <h2>Kazeno</h2> <p>09776442942</p> </div>
    </div>

    <div class="wallet-card">
        <h3>Wallet Balance</h3>
        <div class="balance">6,800 Ks</div> <div class="wallet-btns">
            <button class="btn-wallet btn-topup"><i class="fas fa-plus-circle"></i> Top Up</button>
            <button class="btn-wallet btn-withdraw"><i class="fas fa-wallet"></i> Withdrawal</button>
        </div>
    </div>

    <div class="section-title">Popular Games</div>
    <div class="game-list">
        <div class="game-item">
            <div class="game-detail">
                <img src="https://m.media-amazon.com/images/I/41O7DqQW2KL.png" class="game-icon">
                <div>
                    <div class="game-name">Mobile Legends</div>
                    <div class="game-sold">1451 Sold</div> </div>
            </div>
            <button class="btn-buy" onclick="showBuyPage('MLBB')">Buy</button>
        </div>

        <div class="game-item">
            <div class="game-detail">
                <img src="https://play-lh.googleusercontent.com/6U6vV97y0-24N8s-kO77Fp6_G6uD-6V6K3X0fN-Uv_M-pW8P0-X" class="game-icon">
                <div>
                    <div class="game-name">PUBG Mobile</div>
                    <div class="game-sold">35 Sold</div> </div>
            </div>
            <button class="btn-buy" onclick="showBuyPage('PUBG')">Buy</button>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <a href="#" class="nav-item active"><i class="fas fa-home"></i>Shop</a>
    <a href="#" class="nav-item"><i class="fas fa-shopping-cart"></i>Orders</a>
    <a href="#" class="nav-item"><i class="fas fa-comment-dots"></i>Services</a>
    <a href="#" class="nav-item"><i class="fas fa-user"></i>Profile</a>
</nav>

<script>
    function showBuyPage(game) {
        alert(game + " ဝယ်ယူမည့် စာမျက်နှာသို့ သွားနေပါသည်...");
        // နောက်ပိုင်းမှာ အော်ဒါတင်တဲ့ Form ဆီ လှမ်းပို့ဖို့ လုပ်ရပါမယ်
    }
</script>

</body>
</html>
