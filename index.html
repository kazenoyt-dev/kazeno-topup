<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kazeno Game Topup - Professional MLBB Services</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #007bff; --secondary: #2c3e50; --bg: #f8f9fa; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; padding-bottom: 50px; }
        .header { background: var(--secondary); color: white; padding: 30px 20px; text-align: center; border-radius: 0 0 20px 20px; }
        .tab-container { display: flex; justify-content: center; margin-top: -25px; gap: 10px; }
        .tab { padding: 12px 25px; background: white; border-radius: 30px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 2px solid transparent; }
        .tab.active { border-color: var(--primary); color: var(--primary); }
        .content { max-width: 450px; margin: 30px auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .hidden { display: none; }
        .payment-card { background: #eef7ff; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 4px solid var(--primary); }
        label { display: block; margin: 15px 0 5px; font-weight: 600; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-order { background: var(--primary); color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .floating-btn { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-decoration: none; }
    </style>
</head>
<body>

<div class="header">
    <h1>Kazeno Game Topup</h1>
    <p>Mobile Legends</p>
</div>

<div class="tab-container">
    <div class="tab active" onclick="switchTab('buy')">အော်ဒါတင်ရန်</div>
    <div class="tab" onclick="switchTab('check')">အခြေအနေစစ်ရန်</div>
</div>

<div id="buy-section" class="content">
    <div class="payment-card">
        <strong>💰 ငွေလွှဲရန် အကောင့်:</strong><br>
        KPay: 09xxxxxxxxx (U Mya)<br>
        Wave: 09xxxxxxxxx (U Mya)
    </div>

    <form id="topupForm">
        <label>Game User ID:</label>
        <input type="number" id="userId" placeholder="ID ရိုက်ထည့်ပါ" required>
        <label>Zone ID:</label>
        <input type="number" id="zoneId" placeholder="Server ID" required>
        
        <label>Diamond Package:</label>
        <select id="package" required>
            <option value="">-- Package ကို ရွေးပါ --</option>
            <optgroup label="Weekly Pass">
                <option value="Weekly_Pass_6300">Weekly Diamond Pass - 6,300 Ks</option>
            </optgroup>
            <optgroup label="Regular Price">
                <option value="11_Dai_1000">11 Dai - 1,000 Ks</option>
                <option value="86_Dai_5300">86 Dai - 5,300 Ks</option>
                <option value="172_Dai_10500">172 Dai - 10,500 Ks</option>
                <option value="9288_Dai_505000">9288 Dai - 505,000 Ks</option>
            </optgroup>
        </select>

        <label>ငွေလွှဲပြေစာ (Screenshot):</label>
        <input type="file" id="receipt" accept="image/*" required>

        <button type="submit" id="submitBtn" class="btn-order">Order တင်မည်</button>
    </form>
</div>

<div id="check-section" class="content hidden">
    <h3>🔍 Order Status စစ်မည်</h3>
    <input type="number" id="searchId" placeholder="User ID ရိုက်ထည့်ပါ">
    <button onclick="checkStatus()" class="btn-order" style="background: var(--secondary);">စစ်ဆေးမည်</button>
    <div id="statusResult" style="margin-top: 20px;"></div>
</div>

<a href="https://t.me/kazeno" class="floating-btn"><i class="fab fa-telegram-plane"></i></a>

<script type="module" src="app.js"></script>
<script>
    function switchTab(type) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        if(type === 'buy') {
            document.getElementById('buy-section').classList.remove('hidden');
            document.getElementById('check-section').classList.add('hidden');
        } else {
            document.getElementById('buy-section').classList.add('hidden');
            document.getElementById('check-section').classList.remove('hidden');
        }
    }
</script>
</body>
</html>
