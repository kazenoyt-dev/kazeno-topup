<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Kazeno Shop - Game Topup</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #050510; 
    --glass: rgba(20, 25, 45, 0.4); 
    --border: rgba(255, 255, 255, 0.05);
    --text: #ffffff; 
    --muted: #a0b0c0;
    --primary: #8a2be2; 
    --accent: #4facfe; 
    --r: 20px;
  }
  
  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
  body{margin:0; font-family:'Poppins', sans-serif; background:var(--bg); color:var(--text); padding-bottom:100px; overflow-x: hidden;}
  body::before { content:''; position:fixed; top:-10%; left:-10%; width:50%; height:50%; background: radial-gradient(circle, rgba(138,43,226,0.1) 0%, transparent 70%); z-index:-1;}
  
  .wrap{max-width:520px; margin:0 auto; padding:16px;}
  .glass { background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: var(--r); }

  /* TOP HEADER */
  .top { display:flex; align-items:center; justify-content:space-between; padding:16px; position:sticky; top:10px; z-index:100; transition: 0.3s; margin-bottom: 20px;}
  .brand { font-weight:800; font-size: 20px; background: linear-gradient(45deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .icon-btn { background:transparent; border:none; color:var(--text); cursor:pointer; display:flex; padding:5px; transition:0.2s;}
  .icon-btn:active { transform: scale(0.9); color: var(--accent); }
  .svg-icon { width: 22px; height: 22px; stroke: currentColor; stroke-width: 2; fill: none; }

  /* PROMO BANNER */
  .banner { width: 100%; aspect-ratio: 16/7; border-radius: var(--r); overflow: hidden; position: relative; margin-bottom: 25px; border: 1px solid var(--border); }
  .banner img { width: 100%; height: 100%; object-fit: cover; }
  .banner-overlay { position: absolute; inset: 0; background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, transparent 60%); display: flex; align-items: flex-end; padding: 15px; }
  .banner-text { font-size: 14px; font-weight: 700; color: #fff; }

  /* GAME GRID */
  .section-title { font-size: 16px; font-weight: 800; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
  .section-title::before { content: ''; width: 4px; height: 18px; background: var(--accent); border-radius: 2px; }
  
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .game-card { display: flex; flex-direction: column; align-items: center; text-align: center; cursor: pointer; transition: 0.2s; padding: 5px; }
  .game-card:active { transform: scale(0.95); }
  .game-thumb { width: 100%; aspect-ratio: 1/1; border-radius: 18px; overflow: hidden; border: 1px solid var(--border); background: #000; margin-bottom: 8px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
  .game-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .game-name { font-size: 11px; font-weight: 600; color: #e5e7eb; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }

  /* NOTIFICATION BAR */
  .noti-bar { display: flex; align-items: center; gap: 10px; padding: 12px 16px; margin-bottom: 25px; font-size: 12px; color: var(--accent); background: rgba(79, 172, 254, 0.05); border: 1px dashed rgba(79, 172, 254, 0.3); border-radius: 14px;}

  /* iOS BOTTOM NAV */
  .nav { position:fixed; left:0; bottom:0; width:100%; display:flex; justify-content:space-around; background:rgba(10, 12, 20, 0.85); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border-top:1px solid rgba(255,255,255,0.05); padding: 12px 10px max(12px, env(safe-area-inset-bottom)); z-index: 100; }
  .nav button { flex:1; background:transparent; border:none; color:var(--muted); cursor:pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; transition:0.3s; }
  .nav button.active { color: var(--accent); }
  .nav button span { font-size: 10px; font-weight: 600; }

  /* TOAST */
  .toast { position:fixed; left:50%; transform:translateX(-50%); bottom:100px; background:var(--ok); color:#000; padding:10px 24px; border-radius:999px; font-weight:800; font-size:13px; opacity:0; transition:0.3s; z-index:2000; pointer-events:none;}
  .toast.show { opacity:1; transform:translateX(-50%) translateY(-10px); }
</style>
</head>

<body>
<div id="toast" class="toast">Success</div>

<div class="wrap">
  <div class="top glass">
      <div class="brand">Kazeno Shop</div>
      <div style="display:flex; gap:10px;">
          <button class="icon-btn" onclick="vibe();">
              <svg class="svg-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          </button>
          <button class="icon-btn" onclick="vibe();">
              <svg class="svg-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          </button>
      </div>
  </div>

  <div class="banner">
      <img src="https://img.freepik.com/free-vector/abstract-horizontal-banner-gaming-style_23-2148704257.jpg" alt="Promo">
      <div class="banner-overlay">
          <div class="banner-text">Instant Delivery within 1-5 mins! ⚡</div>
      </div>
  </div>

  <div class="noti-bar">
      <svg class="svg-icon" style="width:16px;height:16px;" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
      MLBB Diamond ဈေးနှုန်းများ အနည်းငယ် ပြောင်းလဲထားပါသည်။
  </div>

  <div class="section-title">Popular Games</div>
  <div class="grid">
      <div class="game-card" onclick="openGame('mlbb'); vibe();">
          <div class="game-thumb"><img src="https://m.mobilelegends.com/static/images/index/logo.png" alt="MLBB"></div>
          <div class="game-name">Mobile Legends</div>
      </div>
      <div class="game-card" onclick="openGame('pubg'); vibe();">
          <div class="game-thumb"><img src="https://yt3.googleusercontent.com/4q-vJ_wW_Hk5_X49o_A3T5nF0M0T_L9YyK2G-Z-p3_x5Z5yX_Y1Y_yR_Z_xZ-y-X-x-y-A=s900-c-k-c0x00ffffff-no-rj" alt="PUBG"></div>
          <div class="game-name">PUBG Mobile</div>
      </div>
      <div class="game-card" onclick="openGame('ff'); vibe();">
          <div class="game-thumb"><img src="https://i.pinimg.com/736x/8c/b3/8c/8cb38c5b16e87b7a1510d7a04918e7e1.jpg" alt="FF"></div>
          <div class="game-name">Free Fire</div>
      </div>
      <div class="game-card" onclick="openGame('hok'); vibe();">
          <div class="game-thumb"><img src="https://play-lh.googleusercontent.com/p09F3rM5i0YyG6yG3N9S7u6W5H5p0uR8K5=s200" alt="HOK"></div>
          <div class="game-name">Honor of Kings</div>
      </div>
  </div>
</div>

<div class="nav">
    <button class="active" onclick="vibe();">
        <svg viewBox="0 0 24 24" class="svg-icon"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
        <span>Home</span>
    </button>
    <button onclick="vibe();">
        <svg viewBox="0 0 24 24" class="svg-icon"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        <span>Orders</span>
    </button>
    <button onclick="vibe();">
        <svg viewBox="0 0 24 24" class="svg-icon"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        <span>Support</span>
    </button>
    <button onclick="vibe();">
        <svg viewBox="0 0 24 24" class="svg-icon"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        <span>Profile</span>
    </button>
</div>

<script>
  function vibe() { if(navigator.vibrate) navigator.vibrate(40); }
  function toast(msg) { const t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show"); setTimeout(()=> t.classList.remove("show"), 2500); }
  
  function openGame(game) {
      toast("Opening " + game.toUpperCase() + " Shop...");
      // နောက်တစ်ဆင့်အတွက် Slide-up logic များကို ဤနေရာတွင် ထပ်ထည့်ပါမည်။
  }
</script>
</body>
</html>
