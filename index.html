<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kazeno Game Topup - MLBB</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        label { font-weight: bold; margin-top: 10px; display: block; }
        input, select, button { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; font-size: 16px; cursor: pointer; border: none; }
        button:hover { background-color: #0056b3; }
        .payment-info { background-color: #e9ecef; padding: 10px; border-radius: 5px; font-size: 14px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Kazeno Game Topup</h2>
    <p style="text-align: center; color: #666;">Mobile Legends Diamond</p>

    <div class="payment-info">
        <strong>ငွေလွှဲရန် အကောင့်များ:</strong><br>
        KPay: 09123456789 (U Mya)<br>
        Wave: 09123456789 (U Mya)
    </div>

    <form id="topupForm">
        <label for="userId">Game User ID:</label>
        <input type="number" id="userId" placeholder="ဥပမာ - 12345678" required>

        <label for="zoneId">Zone ID:</label>
        <input type="number" id="zoneId" placeholder="ဥပမာ - 1234" required>

        <label for="package">Diamond Package:</label>
        <select id="package" required>
            <option value="">Package ရွေးချယ်ပါ</option>
            <option value="86_Diamonds_3000">86 Diamonds - 3,000 MMK</option>
            <option value="172_Diamonds_6000">172 Diamonds - 6,000 MMK</option>
            <option value="257_Diamonds_9000">257 Diamonds - 9,000 MMK</option>
        </select>

        <label for="receipt">ငွေလွှဲပြေစာ (Screenshot):</label>
        <input type="file" id="receipt" accept="image/*" required>

        <button type="submit" id="submitBtn">Order တင်မည်</button>
    </form>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
