<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Admin - Kazeno Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --bg: #020205; --surface: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.1); --text: #e2e8f0; --muted: #94a3b8; --primary: #8a2be2; --accent: #4facfe; --ok: #10b981; --danger: #ef4444; --warning: #f59e0b; }
  * { box-sizing: border-box; outline: none; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent;}
  body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

  /* Glassmorphism Classes */
  .glass-card { background: var(--surface); backdrop-filter: blur(20px); border: 1px solid var(--border); box-shadow: 0 8px 32px 0 rgba(0,0,0,0.3); }

  .sidebar { width: 250px; background: rgba(5,5,10,0.8); backdrop-filter: blur(20px); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.3s; z-index: 10000; flex-shrink: 0; }
  .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; z-index: 1; width: 100%;}
  .top-header { height: 60px; background: rgba(5,5,10,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; justify-content: space-between;}
  .content-area { flex: 1; overflow-y: auto; padding: 20px; }

  .brand-area { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--border); }
  .brand-text { font-weight: 700; font-size: 16px; color: #fff; display: flex; align-items: center; gap: 10px; }
  
  .menu-wrap { flex: 1; overflow-y: auto; padding: 15px 0; }
  .menu-label { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; margin: 15px 20px 5px; letter-spacing: 1px;}
  .menu-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; color: var(--muted); font-size: 13px; font-weight: 500; cursor: pointer; transition: 0.2s; border-left: 3px solid transparent; }
  .menu-item:hover, .menu-item.active { background: rgba(79,172,254,0.1); color: #fff; border-left-color: var(--accent); }

  .view { display: none; animation: fadeIn 0.3s; } .view.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

  .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 20px; }
  .stat-card { background: var(--surface); backdrop-filter: blur(10px); padding: 15px; border-radius: 16px; border: 1px solid var(--border); }
  .stat-val { font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 5px; }
  .stat-label { font-size: 11px; color: var(--muted); }

  .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; position: relative; z-index: 10;}
  .page-title { font-size: 18px; font-weight: 700; }
  
  .table-wrapper { background: var(--surface); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 16px; overflow-x: auto; width: 100%; margin-bottom: 20px; }
  table { width: 100%; border-collapse: collapse; text-align: left; min-width: 500px; }
  th { padding: 12px 15px; font-size: 11px; font-weight: 600; color: var(--muted); border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.02); white-space: nowrap;}
  td { padding: 12px 15px; font-size: 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:hover { background: rgba(255,255,255,0.05); }

  .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 600; }
  .bg-active { background: rgba(16, 185, 129, 0.1); color: var(--ok); border: 1px solid rgba(16,185,129,0.2); }
  .bg-inactive { background: rgba(245, 158, 11, 0.1); color: var(--warning); border: 1px solid rgba(245,158,11,0.2); }
  .bg-pill { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--border); }
  .id-tag { font-family: monospace; color: var(--accent); background: rgba(79, 172, 254, 0.1); padding: 3px 6px; border-radius: 4px; font-size: 10px; }

  .btn { padding: 8px 14px; border-radius: 8px; border: none; font-size: 11px; font-weight: 600; cursor: pointer; color: #fff; transition: 0.2s; display: inline-flex; align-items: center; gap:4px; }
  .btn-primary { background: linear-gradient(135deg,var(--accent),var(--primary)); } 
  .btn-ok { background: var(--ok); } 
  .btn-danger { background: var(--danger); }
  .btn-dark { background: rgba(255,255,255,0.1); border: 1px solid var(--border); }

  .detail-card { background: var(--surface); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
  .input-box, .select-box { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 10px 12px; border-radius: 8px; color: #fff; font-size: 12px;}
  .input-box:focus { border-color: var(--accent); }
  .upload-box { border: 1px dashed var(--border); border-radius: 8px; padding: 15px; text-align: center; color: var(--muted); cursor: pointer; font-size: 11px; background: rgba(0,0,0,0.3); transition: 0.3s;}

  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 15px; }
  .modal-bg.active { display: flex; } 
  .modal-card { background: rgba(10,10,15,0.9); border: 1px solid var(--border); border-radius: 16px; padding: 20px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
</style>
</head>
<body>
<div id="auth-gate" style="position:fixed; inset:0; background:var(--bg); z-index:99999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <div style="font-size:24px; font-weight:bold; margin-bottom:20px; color:var(--accent);">Admin System</div>
    <input type="password" id="admin-pin" placeholder="Enter PIN" style="padding:15px; border-radius:12px; border:1px solid var(--border); background:rgba(255,255,255,0.05); color:#fff; text-align:center; margin-bottom:15px; width:250px;">
    <button class="btn btn-primary" style="width:250px; padding:15px;" onclick="checkPin()">Secure Login</button>
</div>
