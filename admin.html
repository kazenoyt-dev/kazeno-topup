<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Admin - Kazeno Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
  :root { --bg: #020205; --surface: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.1); --text: #e2e8f0; --muted: #94a3b8; --primary: #8a2be2; --accent: #4facfe; --ok: #10b981; --danger: #ef4444; --warning: #f59e0b; }
  * { box-sizing: border-box; outline: none; margin: 0; padding: 0; font-family: 'Inter', sans-serif;}
  body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

  .glass-card { background: var(--surface); backdrop-filter: blur(20px); border: 1px solid var(--border); box-shadow: 0 8px 32px 0 rgba(0,0,0,0.3); }

  .sidebar { width: 250px; background: rgba(5,5,10,0.8); backdrop-filter: blur(20px); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.3s; z-index: 10000; flex-shrink: 0; }
  .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; z-index: 1; width: 100%;}
  .top-header { height: 60px; background: rgba(5,5,10,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; justify-content: space-between;}
  .content-area { flex: 1; overflow-y: auto; padding: 20px; }

  .brand-area { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--border); }
  .menu-wrap { flex: 1; overflow-y: auto; padding: 15px 0; }
  .menu-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; color: var(--muted); font-size: 13px; font-weight: 500; cursor: pointer; transition: 0.2s; border-left: 3px solid transparent; }
  .menu-item:hover, .menu-item.active { background: rgba(79,172,254,0.1); color: #fff; border-left-color: var(--accent); }

  .view { display: none; } .view.active { display: block; }
  .btn-primary { background: linear-gradient(135deg,var(--accent),var(--primary)); color: white; border:none; padding:10px 15px; border-radius:8px; cursor:pointer; font-weight:bold;}
  
  /* Additional Styles kept minimal to save space, relies on inline styles and simple classes */
  table { width: 100%; border-collapse: collapse; text-align: left; }
  th, td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px;}
  .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 600; }
  .bg-active { background: rgba(16, 185, 129, 0.1); color: var(--ok); }
  .bg-inactive { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
</style>
</head>
<body>

<div id="auth-gate" style="position:fixed; inset:0; background:var(--bg); z-index:99999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <div style="font-size:24px; font-weight:bold; margin-bottom:20px; color:var(--accent);">Admin System</div>
    <input type="password" id="admin-pin" placeholder="Enter PIN (1234)" style="padding:15px; border-radius:12px; border:1px solid var(--border); background:rgba(255,255,255,0.05); color:#fff; text-align:center; margin-bottom:15px; width:250px;">
    <button class="btn-primary" style="width:250px; padding:15px;" onclick="checkPin()">Secure Login</button>
</div>

<div id="main-admin" style="display:none; width:100%; height:100%;">
    <div class="sidebar" id="sidebar">
        <div class="brand-area"><div style="font-weight:bold; color:white;">Kazeno Admin</div></div>
        <div class="menu-wrap">
            <div class="menu-item active" onclick="switchTab('v-orders', this)"><i class="fas fa-shopping-cart"></i> Orders</div>
            <div class="menu-item" onclick="switchTab('v-users', this)"><i class="fas fa-users"></i> Users</div>
            <div class="menu-item" style="color:var(--danger);" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i> Logout</div>
        </div>
    </div>

    <div class="main-content">
        <div class="top-header">
            <div style="font-size:18px; font-weight:bold;" id="page-title">Orders Management</div>
            <div style="width:30px; height:30px; background:var(--primary); border-radius:50%; display:flex; align-items:center; justify-content:center;">A</div>
        </div>
        
        <div class="content-area">
            <div id="v-orders" class="view active">
                <div class="glass-card" style="padding:20px; overflow-x:auto;">
                    <table>
                        <thead><tr><th>Order ID</th><th>Game - Item</th><th>User</th><th>Status</th><th>Action</th></tr></thead>
                        <tbody id="tb-orders"><tr><td colspan="5" style="text-align:center;">Loading...</td></tr></tbody>
                    </table>
                </div>
            </div>

            <div id="v-users" class="view">
                <div class="glass-card" style="padding:20px; overflow-x:auto;">
                    <table>
                        <thead><tr><th>Email</th><th>Balance</th><th>Role</th></tr></thead>
                        <tbody id="tb-users"><tr><td colspan="3" style="text-align:center;">Loading...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyAV2vKB0pBq4PP7LcKFO2h9D9dmZF7J2IU", authDomain: "kazeno-diamond-shop.firebaseapp.com", projectId: "kazeno-diamond-shop", storageBucket: "kazeno-diamond-shop.firebasestorage.app", messagingSenderId: "1209500360", appId: "1:1209500360:web:0e6f932cfd1569234e9bfd" };
    const app = initializeApp(firebaseConfig); const db = getFirestore(app);

    // ✅ FIXED: Authentication PIN logic attached to Window
    window.checkPin = () => { 
        if(document.getElementById('admin-pin').value === "1234") { 
            document.getElementById('auth-gate').style.display = "none"; 
            document.getElementById('main-admin').style.display = "flex"; 
            initAdmin(); 
        } else { alert("Invalid PIN!"); }
    };

    window.switchTab = (viewId, el) => { 
        document.querySelectorAll('.menu-item').forEach(t => t.classList.remove('active')); el.classList.add('active'); 
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById(viewId).classList.add('active'); 
        document.getElementById('page-title').innerText = el.innerText.trim();
    };

    function initAdmin() {
        // Fetch Orders
        onSnapshot(query(collection(db, "orders"), orderBy("createdAt", "desc")), (snap) => {
            let h = "";
            snap.forEach(d => {
                let o = {id: d.id, ...d.data()};
                let c = o.status==='Completed' ? 'bg-active' : (o.status==='Cancelled' ? 'bg-inactive' : 'badge');
                h += `<tr>
                    <td><strong style="color:var(--accent);">${o.orderId||o.id.substring(0,8)}</strong></td>
                    <td>${o.game} - ${o.item}</td>
                    <td>${o.userEmail}</td>
                    <td><span class="badge ${c}" style="background:rgba(255,255,255,0.1); border:1px solid currentColor;">${o.status}</span></td>
                    <td>
                        ${o.status !== 'Completed' ? `<button class="btn-primary" style="padding:5px 10px; font-size:10px;" onclick="markDone('${o.id}')">Mark Complete</button>` : 'Done'}
                    </td>
                </tr>`;
            });
            document.getElementById('tb-orders').innerHTML = h || "<tr><td colspan='5' style='text-align:center;'>No orders.</td></tr>";
        });

        // Fetch Users
        onSnapshot(collection(db, "users"), (snap) => {
            let h = "";
            snap.forEach(d => {
                let u = d.data();
                h += `<tr><td>${u.email}</td><td style="color:var(--ok); font-weight:bold;">${(u.walletBalance||0).toLocaleString()} Ks</td><td>${u.role||'Customer'}</td></tr>`;
            });
            document.getElementById('tb-users').innerHTML = h || "<tr><td colspan='3' style='text-align:center;'>No users.</td></tr>";
        });
    }

    // Mark Order as Completed
    window.markDone = async (id) => {
        if(confirm("Confirm order completion?")) {
            await updateDoc(doc(db,"orders",id), {status: "Completed"});
        }
    };
</script>
</body>
</html>
