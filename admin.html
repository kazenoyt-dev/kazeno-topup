<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kazeno+ | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .status-badge { padding: 0.25rem 0.6rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; display: inline-flex; items-center; gap: 0.25rem; }
        .status-Pending { background-color: #fef3c7; color: #d97706; }
        .status-Processing { background-color: #e0e7ff; color: #4338ca; }
        .status-Completed { background-color: #dcfce3; color: #15803d; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-gray-800">

    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col hidden md:flex">
        <div class="h-16 flex items-center px-6 border-b border-gray-200">
            <h1 class="text-xl font-bold text-blue-600"><i class="fas fa-gamepad mr-2"></i>Kazeno+</h1>
        </div>
        <nav class="flex-1 px-4 py-4 space-y-1">
            <a href="#" class="flex items-center gap-3 px-3 py-2 bg-blue-50 text-blue-600 rounded-lg font-medium"><i class="fas fa-th-large"></i> Orders</a>
            <a href="#" class="flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg font-medium"><i class="fas fa-users"></i> Users</a>
            <a href="#" class="flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg font-medium"><i class="fas fa-cog"></i> Settings</a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-y-auto">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 sticky top-0 z-10">
            <h2 class="text-lg font-semibold">Admin Dashboard</h2>
            <div class="flex items-center gap-4">
                <button class="text-gray-400 hover:text-gray-600"><i class="fas fa-bell"></i></button>
                <div class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold">A</div>
            </div>
        </header>

        <div class="p-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
                    <div class="text-gray-500 text-sm font-medium mb-1">Total Orders</div>
                    <div class="text-3xl font-bold text-gray-800" id="totalCount">0</div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
                    <div class="text-gray-500 text-sm font-medium mb-1">Pending</div>
                    <div class="text-3xl font-bold text-yellow-600" id="pendingCount">0</div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
                    <div class="text-gray-500 text-sm font-medium mb-1">Completed</div>
                    <div class="text-3xl font-bold text-green-600" id="completedCount">0</div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                    <h3 class="font-bold text-gray-800">Recent Orders</h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-xs text-gray-500 uppercase bg-white border-b border-gray-100">
                                <th class="px-6 py-4 font-semibold">Order ID</th>
                                <th class="px-6 py-4 font-semibold">Items</th>
                                <th class="px-6 py-4 font-semibold">Player ID</th>
                                <th class="px-6 py-4 font-semibold">Status</th>
                                <th class="px-6 py-4 font-semibold text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="ordersTableBody" class="divide-y divide-gray-100">
                            <tr><td colspan="5" class="text-center py-8 text-gray-400">Loading orders...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ⚠️ သင့်ရဲ့ Firebase Config ကို ဒီနေရာမှာ အစားထိုးပါ ⚠️
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Orders များကို Real-time ဆွဲယူခြင်း
        db.collection("orders").orderBy("timestamp", "desc").limit(50)
            .onSnapshot((snapshot) => {
                const tbody = document.getElementById("ordersTableBody");
                tbody.innerHTML = ""; 

                let total = 0, pending = 0, completed = 0;

                if (snapshot.empty) {
                    tbody.innerHTML = `<tr><td colspan="5" class="text-center py-8 text-gray-500">No orders found.</td></tr>`;
                    return;
                }

                snapshot.forEach((doc) => {
                    total++;
                    const order = doc.data();
                    const orderId = doc.id;
                    const playerIdRaw = order.playerId || ""; 
                    const cleanId = playerIdRaw.split(' ')[0]; 
                    
                    if(order.status === 'Completed') completed++;
                    else pending++;

                    // Status icon ရွေးချယ်ခြင်း
                    let statusIcon = order.status === 'Completed' ? '<i class="fas fa-check-circle"></i>' : 
                                     order.status === 'Processing' ? '<i class="fas fa-spinner fa-spin"></i>' : '<i class="fas fa-clock"></i>';

                    const tr = document.createElement("tr");
                    tr.className = "hover:bg-gray-50 transition-colors";
                    
                    tr.innerHTML = `
                        <td class="px-6 py-4 text-sm font-medium text-gray-800">${order.orderId}</td>
                        <td class="px-6 py-4 text-sm text-gray-600 flex items-center gap-1"><i class="far fa-gem text-blue-500"></i> ${order.item} Diamonds</td>
                        <td class="px-6 py-4 text-sm text-gray-600 font-mono">
                            ${playerIdRaw}
                            <button onclick="copyToClipboard('${cleanId}')" class="ml-2 text-gray-400 hover:text-blue-600"><i class="far fa-copy"></i></button>
                        </td>
                        <td class="px-6 py-4">
                            <span class="status-badge status-${order.status}">
                                ${statusIcon} ${order.status}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-right">
                            ${order.status !== 'Completed' ? `
                                <button onclick="markAsCompleted('${orderId}')" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-lg text-sm font-medium transition-colors shadow-sm">
                                    Done
                                </button>
                            ` : `<span class="text-gray-400 text-sm font-medium">Finished</span>`}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                // Update Stats
                document.getElementById('totalCount').innerText = total;
                document.getElementById('pendingCount').innerText = pending;
                document.getElementById('completedCount').innerText = completed;
            });

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            alert("ID Copied: " + text);
        }

        async function markAsCompleted(orderId) {
            if(confirm("အော်ဒါကို ငွေဖြည့်ပေးပြီးပြီ သေချာပါသလား?")) {
                await db.collection("orders").doc(orderId).update({ status: "Completed" });
            }
        }
    </script>
</body>
</html>
