<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin - Kazeno Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #050510; --glass: rgba(20, 25, 45, 0.7); --border: rgba(255, 255, 255, 0.1);
    --text: #ffffff; --muted: #9ca3af; --primary: #8a2be2; --accent: #4facfe; 
    --ok: #10b981; --danger: #ef4444; --warning: #f59e0b;
  }
  * { box-sizing: border-box; outline: none; margin: 0; padding: 0;}
  body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh;}
  
  /* HEADER NAV */
  .top-nav { background: var(--glass); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
  .brand { font-weight: 800; font-size: 18px; color: var(--accent); }
  .nav-tabs { display: flex; gap: 15px; }
  .tab-btn { background: transparent; border: none; color: var(--muted); font-size: 14px; font-weight: 600; cursor: pointer; padding: 5px 10px; border-radius: 8px; transition: 0.3s;}
  .tab-btn.active { background: rgba(79, 172, 254, 0.15); color: var(--accent); }

  /* CONTENT AREA */
  .content { padding: 20px; flex: 1; overflow-y: auto; }
  .view { display: none; animation: fadeIn 0.3s ease; }
  .view.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* CARDS & TABLES */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
  .stat-card { background: var(--glass); border: 1px solid var(--border); padding: 20px; border-radius: 16px; text-align: center; }
  .stat-val { font-size: 24px; font-weight: 800; color: var(--accent); margin-top: 5px; }
  .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; }

  .data-list { display: flex; flex-direction: column; gap: 12px; }
  .data-item { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 12px; padding: 15px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 10px;}
  .data-info { flex: 1; min-width: 200px; font-size: 13px; line-height: 1.6; }
  .data-info strong { color: #fff; }
  .data-info span { color: var(--muted); }
  .badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
  .badge.pending { color: var(--warning); background: rgba(245, 158, 11, 0.1); }
  .badge.completed { color: var(--ok); background: rgba(16, 185, 129, 0.1); }
  .badge.cancelled { color: var(--danger); background: rgba(239, 68, 68, 0.1); }
  
  .action-btns { display: flex; gap: 8px; }
  .btn { padding: 8px 12px; border-radius: 8px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; color: #fff; }
  .btn-approve { background: var(--ok); color: #000; }
  .btn-reject { background: var(--danger); }
  .btn-edit { background: rgba(255,255,255,0.1); border: 1px solid var(--border); }
  .btn-view { background: var(--accent); color: #000; }

  /* MODAL */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px;}
  .modal-bg.active { display: flex; }
  .modal-card { background: var(--bg); border: 1px solid var(--border); border-radius: 16px; padding: 20px; width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto; text-align: center; }
  .modal-img { width: 100%; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border); }

  .toast { position:fixed; top:20px; right:20px; background:var(--accent); color:#000; padding:10px 20px; border-radius:8px; font-weight:700; font-size:13px; opacity:0; transition:0.3s; z-index:2000; pointer-events:none;}
  .toast.show { opacity:1; transform:translateY(10px); }
</style>
</head>
<body>

<div id="toast" class="toast">Success</div>

<div id="auth-gate" style="position:fixed; inset:0; background:var(--bg); z-index:999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <h2 style="color:var(--accent); margin-bottom:20px;">Admin Access</h2>
    <input type="password" id="admin-pin" placeholder="Enter PIN" style="padding:15px; border-radius:10px; border:1px solid var(--border); background:#111; color:#fff; text-align:center; font-size:18px; margin-bottom:15px;">
    <button onclick="checkPin()" style="padding:12px 30px; background:var(--accent); border:none; border-radius:10px; font-weight:bold; cursor:pointer;">Enter</button>
</div>

<div id="main-admin" style="display:none; height:100%; flex-direction:column;">
    <div class="top-nav">
        <div class="brand">Kazeno Admin</div>
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('v-dash', this)">Dashboard</button>
            <button class="tab-btn" onclick="switchTab('v-users', this)">Users</button>
            <button class="tab-btn" onclick="switchTab('v-orders', this)">Orders</button>
            <button class="tab-btn" onclick="switchTab('v-deposits', this)">Deposits</button>
        </div>
    </div>

    <div class="content">
        <div id="v-dash" class="view active">
            <div class="stat-grid">
                <div class="stat-card"><div class="stat-label">Total Users</div><div class="stat-val" id="st-users">0</div></div>
                <div class="stat-card"><div class="stat-label">Total Orders</div><div class="stat-val" id="st-orders">0</div></div>
                <div class="stat-card"><div class="stat-label">Pending Orders</div><div class="stat-val" id="st-p-orders" style="color:var(--warning);">0</div></div>
                <div class="stat-card"><div class="stat-label">Pending Deposits</div><div class="stat-val" id="st-p-deps" style="color:var(--warning);">0</div></div>
            </div>
            <div style="color:var(--muted); font-size:13px; text-align:center; margin-top:20px;">Welcome to Kazeno Admin Panel. Select a tab above to manage data.</div>
        </div>

        <div id="v-users" class="view">
            <h3 style="margin-bottom:15px;">User Management</h3>
            <div class="data-list" id="list-users">Loading...</div>
        </div>

        <div id="v-orders" class="view">
            <h3 style="margin-bottom:15px;">Shop Orders</h3>
            <div class="data-list" id="list-orders">Loading...</div>
        </div>

        <div id="v-deposits" class="view">
            <h3 style="margin-bottom:15px;">Wallet Deposits</h3>
            <div class="data-list" id="list-deposits">Loading...</div>
        </div>
    </div>
</div>

<div class="modal-bg" id="slip-modal" onclick="if(event.target===this) this.classList.remove('active')">
    <div class="modal-card">
        <h3 style="margin-bottom:10px;">Payment Slip</h3>
        <img id="modal-img-src" class="modal-img" src="">
        <button class="btn btn-edit" style="width:100%;" onclick="document.getElementById('slip-modal').classList.remove('active')">Close</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // 🔑 KAZENO CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyAV2vKB0pBq4PP7LcKFO2h9D9dmZF7J2IU",
        authDomain: "kazeno-diamond-shop.firebaseapp.com",
        projectId: "kazeno-diamond-shop",
        storageBucket: "kazeno-diamond-shop.firebasestorage.app",
        messagingSenderId: "1209500360",
        appId: "1:1209500360:web:0e6f932cfd1569234e9bfd"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.toast = (msg) => { const t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 2500); }
    function formatDate(ts) { if(!ts) return "N/A"; const d = ts.toDate ? ts.toDate() : new Date(ts); return d.toLocaleString('en-US', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}); }

    // Admin PIN Gate
    window.checkPin = () => {
        if(document.getElementById('admin-pin').value === "1234") {
            document.getElementById('auth-gate').style.display = "none";
            document.getElementById('main-admin').style.display = "flex";
            initAdmin();
        } else { toast("Wrong PIN!"); }
    };

    window.switchTab = (viewId, el) => {
        document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        el.classList.add('active');
        document.getElementById(viewId).classList.add('active');
    };

    window.viewSlip = (url) => {
        if(!url) return toast("No slip uploaded (Wallet Payment)");
        document.getElementById('modal-img-src').src = url;
        document.getElementById('slip-modal').classList.add('active');
    };

    function initAdmin() {
        // 1. LISTEN TO USERS
        onSnapshot(collection(db, "users"), (snap) => {
            document.getElementById('st-users').innerText = snap.size;
            let html = "";
            snap.forEach(d => {
                const u = d.data();
                html += `
                <div class="data-item">
                    <div class="data-info">
                        <div><strong>${u.email}</strong></div>
                        <div>Wallet: <span style="color:var(--ok); font-weight:bold;">${(u.walletBalance||0).toLocaleString()} Ks</span></div>
                        <div style="font-size:10px;">Joined: ${formatDate(u.createdAt)}</div>
                    </div>
                    <button class="btn btn-edit" onclick="editWallet('${d.id}', ${u.walletBalance||0}, '${u.email}')">✏️ Edit Balance</button>
                </div>`;
            });
            document.getElementById('list-users').innerHTML = html || "<p>No users found.</p>";
        });

        // 2. LISTEN TO ORDERS
        onSnapshot(collection(db, "orders"), (snap) => {
            document.getElementById('st-orders').innerText = snap.size;
            let pCount = 0; let html = "";
            let arr = []; snap.forEach(d => arr.push({id: d.id, ...d.data()}));
            arr.sort((a,b) => (b.createdAt?.toMillis()||0) - (a.createdAt?.toMillis()||0)); // Sort newest first
            
            arr.forEach(o => {
                if(o.status === 'Pending') pCount++;
                const cls = o.status.toLowerCase();
                html += `
                <div class="data-item">
                    <div class="data-info">
                        <div><span class="badge ${cls}">${o.status}</span> <span style="font-size:10px; margin-left:10px;">${formatDate(o.createdAt)}</span></div>
                        <div style="margin-top:5px;"><strong>${o.game}</strong> - <span style="color:var(--accent);">${o.item}</span></div>
                        <div>ID: <strong>${o.playerId} ${o.serverId?`(${o.serverId})`:''}</strong></div>
                        <div>Price: <strong>${o.price.toLocaleString()} Ks</strong> | Method: <strong>${o.payMethod?.toUpperCase() || 'SLIP'}</strong></div>
                        <div style="font-size:10px;">User: ${o.userEmail}</div>
                    </div>
                    <div class="action-btns" style="flex-direction:column;">
                        ${o.slipImage ? `<button class="btn btn-view" onclick="viewSlip('${o.slipImage}')">🖼️ Slip</button>` : ''}
                        ${o.status === 'Pending' ? `
                            <button class="btn btn-approve" onclick="updateOrderStatus('${o.id}', 'Completed')">✅ Done</button>
                            <button class="btn btn-reject" onclick="updateOrderStatus('${o.id}', 'Cancelled')">❌ Cancel</button>
                        ` : ''}
                    </div>
                </div>`;
            });
            document.getElementById('list-orders').innerHTML = html || "<p>No orders yet.</p>";
            document.getElementById('st-p-orders').innerText = pCount;
        });

        // 3. LISTEN TO DEPOSITS
        onSnapshot(collection(db, "deposits"), (snap) => {
            let pCount = 0; let html = "";
            let arr = []; snap.forEach(d => arr.push({id: d.id, ...d.data()}));
            arr.sort((a,b) => (b.createdAt?.toMillis()||0) - (a.createdAt?.toMillis()||0));
            
            arr.forEach(dp => {
                if(dp.status === 'Pending') pCount++;
                const cls = dp.status.toLowerCase();
                html += `
                <div class="data-item">
                    <div class="data-info">
                        <div><span class="badge ${cls}">${dp.status}</span> <span style="font-size:10px; margin-left:10px;">${formatDate(dp.createdAt)}</span></div>
                        <div style="margin-top:5px; font-size:16px;">Top-up: <strong style="color:var(--ok);">${dp.amount.toLocaleString()} Ks</strong></div>
                        <div>User: <strong>${dp.userEmail}</strong></div>
                    </div>
                    <div class="action-btns" style="flex-direction:column;">
                        <button class="btn btn-view" onclick="viewSlip('${dp.slipImage}')">🖼️ Slip</button>
                        ${dp.status === 'Pending' ? `
                            <button class="btn btn-approve" onclick="approveDeposit('${dp.id}', '${dp.userId}', ${dp.amount})">✅ Add Funds</button>
                            <button class="btn btn-reject" onclick="updateDepositStatus('${dp.id}', 'Cancelled')">❌ Reject</button>
                        ` : ''}
                    </div>
                </div>`;
            });
            document.getElementById('list-deposits').innerHTML = html || "<p>No deposits yet.</p>";
            document.getElementById('st-p-deps').innerText = pCount;
        });
    }

    // --- ADMIN ACTIONS ---
    window.editWallet = async (uid, curBal, email) => {
        const val = prompt(`Edit Wallet for ${email}\nCurrent: ${curBal} Ks\nEnter new exact balance:`, curBal);
        if(val !== null && !isNaN(val)) {
            await updateDoc(doc(db, "users", uid), { walletBalance: parseInt(val) });
            toast("Wallet Updated!");
        }
    };

    window.updateOrderStatus = async (id, status) => {
        if(confirm(`Mark this order as ${status}?`)) {
            await updateDoc(doc(db, "orders", id), { status: status });
            toast(`Order ${status}`);
        }
    };

    window.updateDepositStatus = async (id, status) => {
        if(confirm(`Mark deposit as ${status}?`)) {
            await updateDoc(doc(db, "deposits", id), { status: status });
            toast(`Deposit ${status}`);
        }
    };

    window.approveDeposit = async (depId, uid, amount) => {
        if(confirm(`Approve deposit of ${amount} Ks?\nThis will automatically add to user's wallet.`)) {
            try {
                // 1. Get current user wallet
                const uDoc = await getDoc(doc(db, "users", uid));
                const curBal = uDoc.exists() ? (uDoc.data().walletBalance || 0) : 0;
                
                // 2. Add amount
                await updateDoc(doc(db, "users", uid), { walletBalance: curBal + amount });
                
                // 3. Mark deposit as completed
                await updateDoc(doc(db, "deposits", depId), { status: 'Completed' });
                
                toast("Funds added to user wallet!");
            } catch(e) { toast("Error: " + e.message); }
        }
    };
</script>
</body>
</html>
