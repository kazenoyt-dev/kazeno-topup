<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kazeno Game Topup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .package-card.selected { border-color: #10b981; background-color: rgba(16, 185, 129, 0.1); transform: scale(1.02); }
        .package-card { transition: all 0.3s ease; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .package-card:hover { border-color: #3b82f6; }
        .loader { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen pb-24">

    <header class="bg-slate-900 sticky top-0 z-50 border-b border-slate-800 shadow-lg">
        <div class="max-w-3xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-gradient-to-r from-blue-500 to-teal-400 flex items-center justify-center font-bold text-xl shadow-lg">K</div>
                <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-teal-300">Kazeno Topup</h1>
            </div>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 mt-6 space-y-6">
        
        <div class="glass-panel rounded-2xl p-4 flex gap-4 items-center">
            <img src="https://i.ibb.co/L5QzX2b/mlbb-icon.png" alt="MLBB" class="w-20 h-20 rounded-xl shadow-md" onerror="this.src='https://via.placeholder.com/80x80/1e293b/ffffff?text=MLBB'">
            <div>
                <h2 class="text-2xl font-bold">Mobile Legends</h2>
                <p class="text-sm text-slate-400 mt-1"><i class="fas fa-bolt text-yellow-400 mr-1"></i> Instant Delivery</p>
            </div>
        </div>

        <section class="glass-panel rounded-2xl p-5">
            <div class="flex items-center gap-2 mb-4">
                <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center font-bold">1</div>
                <h3 class="text-lg font-semibold">Enter Player ID</h3>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <input type="number" id="userId" placeholder="User ID" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500">
                <input type="number" id="zoneId" placeholder="Zone ID" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500">
            </div>
        </section>

        <section class="glass-panel rounded-2xl p-5">
            <div class="flex items-center gap-2 mb-4">
                <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center font-bold">2</div>
                <h3 class="text-lg font-semibold">Select Recharge</h3>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                <div class="package-card bg-slate-800 rounded-xl p-3 relative" onclick="selectPackage(this, '11', 1000)">
                    <div class="absolute top-0 right-0 bg-gradient-to-l from-yellow-500 to-orange-400 text-[10px] font-bold px-2 py-1 rounded-bl-lg">HOT</div>
                    <div class="font-bold text-lg mb-1">11 <i class="far fa-gem text-cyan-400"></i></div>
                    <div class="text-slate-400 text-sm">1,000 Ks</div>
                </div>
                <div class="package-card bg-slate-800 rounded-xl p-3" onclick="selectPackage(this, '22', 2000)">
                    <div class="font-bold text-lg mb-1">22 <i class="far fa-gem text-cyan-400"></i></div>
                    <div class="text-slate-400 text-sm">2,000 Ks</div>
                </div>
                <div class="package-card bg-slate-800 rounded-xl p-3" onclick="selectPackage(this, '56', 5000)">
                    <div class="font-bold text-lg mb-1">56 <i class="far fa-gem text-cyan-400"></i></div>
                    <div class="text-slate-400 text-sm">5,000 Ks</div>
                </div>
            </div>
        </section>

        <section class="glass-panel rounded-2xl p-5 mb-8">
            <div class="flex items-center gap-2 mb-4">
                <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center font-bold">3</div>
                <h3 class="text-lg font-semibold">Payment Method</h3>
            </div>
            <select id="paymentMethod" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500">
                <option value="KPay">KBZ Pay</option>
                <option value="WavePay">Wave Pay</option>
                <option value="CBPay">CB Pay</option>
            </select>
        </section>
    </main>

    <div class="fixed bottom-0 left-0 w-full bg-slate-900 border-t border-slate-800 p-4 shadow-2xl z-50">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <div>
                <p class="text-sm text-slate-400">Total Payment</p>
                <p class="text-xl font-bold text-teal-400" id="totalPrice">0 Ks</p>
            </div>
            <button id="buyBtn" onclick="submitOrder()" class="flex items-center gap-2 bg-gradient-to-r from-blue-600 to-teal-500 hover:from-blue-500 hover:to-teal-400 text-white font-bold py-3 px-8 rounded-xl shadow-lg transform transition active:scale-95">
                <span>Buy Now</span>
                <div id="btnLoader" class="loader"></div>
            </button>
        </div>
    </div>

    <script>
        // ⚠️ သင့်ရဲ့ Firebase Config ကို ဒီနေရာမှာ အစားထိုးပါ ⚠️
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Firebase ကို အစပြုခြင်း
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let selectedItem = null;
        let selectedPrice = 0;

        function selectPackage(element, item, price) {
            document.querySelectorAll('.package-card').forEach(card => card.classList.remove('selected'));
            element.classList.add('selected');
            selectedItem = item;
            selectedPrice = price;
            document.getElementById('totalPrice').innerText = price.toLocaleString() + ' Ks';
        }

        async function submitOrder() {
            const uid = document.getElementById('userId').value;
            const zid = document.getElementById('zoneId').value;
            const paymentMethod = document.getElementById('paymentMethod').value;
            const btn = document.getElementById('buyBtn');
            const loader = document.getElementById('btnLoader');

            if(!uid || !zid) return alert("ကျေးဇူးပြု၍ User ID နှင့် Zone ID ကို ထည့်ပါ။");
            if(!selectedItem) return alert("စိန်ပမာဏ ရွေးချယ်ပေးပါ။");

            // Loading ပုံစံပြောင်းမည်
            btn.disabled = true;
            loader.style.display = "block";
            btn.querySelector('span').innerText = "Processing...";

            // Order ID အသစ်ဖန်တီးခြင်း
            const orderId = 'ORD-' + Math.random().toString(36).substr(2, 6).toUpperCase();
            const fullPlayerId = `${uid} (${zid})`;

            try {
                // Firebase ထဲသို့ Order အသစ် ပို့ခြင်း
                await db.collection("orders").doc(orderId).set({
                    orderId: orderId,
                    item: selectedItem,
                    playerId: fullPlayerId,
                    price: selectedPrice,
                    paymentMethod: paymentMethod,
                    status: "Pending", // ချက်ချင်း Pending အနေဖြင့် ဝင်မည်
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                alert(`🎉 အော်ဒါတင်ခြင်း အောင်မြင်ပါသည်။\nOrder ID: ${orderId}\nခဏစောင့်ဆိုင်းပေးပါ!`);
                
                // Form များ ပြန်ဖျက်မည်
                document.getElementById('userId').value = "";
                document.getElementById('zoneId').value = "";
                document.querySelectorAll('.package-card').forEach(card => card.classList.remove('selected'));
                document.getElementById('totalPrice').innerText = "0 Ks";
                selectedItem = null;

            } catch (error) {
                console.error("Error adding document: ", error);
                alert("အော်ဒါတင်ရာတွင် အမှားအယွင်းဖြစ်ပေါ်နေပါသည်။");
            } finally {
                btn.disabled = false;
                loader.style.display = "none";
                btn.querySelector('span').innerText = "Buy Now";
            }
        }
    </script>
</body>
</html>
